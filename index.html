  ctx.font='120px serif';ctx.textAlign='center';

function rCal(){

          '<input type="date" id="ev-end" class="ainp" style="width:100%;padding:.5rem .75rem;font-size:13px;"></div>'+
        '</div>'+

  // мқҙлІҲлӢ¬ мқјм • лӘ©лЎқ
  var moPrefix=yr+'-'+String(mo+1).padStart(2,'0');
  var moEvs=Object.values(S.events).filter(function(e){
    var s=e.startDate||e.date;var en=e.endDate||s;
    return s.startsWith(moPrefix)||en.startsWith(moPrefix)||(s<moPrefix&&en>moPrefix+'-31');

      '<div style="font-size:13px;font-weight:700;color:var(--pr);margin-bottom:8px;">мқҙлІҲ лӢ¬ мқјм •</div>';
    moEvs.forEach(function(ev){
      var sd=ev.startDate||ev.date;var ed=ev.endDate||sd;

      var dateDisplay=sd===ed?sd.slice(5).replace('-','/')+'('+dowName+')':sd.slice(5).replace('-','/') + ' ~ ' + ed.slice(5).replace('-','/');

        (S.isAdmin?'<button class="ev-del" data-evid="'+ev.id+'" style="font-size:11px;padding:2px 6px;border-radius:20px;border:1.5px solid #FECACA;background:#FFF5F5;color:var(--rd);cursor:pointer;">мӮӯм ң</button>':'')+
      '</div>';
    });
    h+='</div>';
  }
  return h+'</div>';
}

// в”Җв”Җ мҠөкҙҖ мІҙнҒ¬ м„№м…ҳ (лӮҙ мқёмҰқ нғӯ н•ҳлӢЁ) в”Җв”Җ
function rHabit(){
  var im=S.loggedMember,ia=S.isAdmin;
  if(!im&&!ia)return rML();
  var me=im||(S.members.filter(function(x){return x.name&&x.name.indexOf('к°•л‘Ҙл§ҳ')>=0;})[0]);
  if(!me)return '<div class="sec">л©ӨлІ„ м •ліҙлҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”</div>';

  var today=new Date();
  var todayKey=today.getFullYear()+'-'+(today.getMonth()+1+'').padStart(2,'0')+'-'+(today.getDate()+'').padStart(2,'0');
  var holidays=['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25'];
  function isWeekend(d){return d.getDay()===0||d.getDay()===6;}
  function isHoliday(d){var mmdd=(d.getMonth()+1+'').padStart(2,'0')+'-'+(d.getDate()+'').padStart(2,'0');return holidays.indexOf(mmdd)>=0;}
  function isOff(d){return isWeekend(d)||isHoliday(d);}
  function dateKey(d){return d.getFullYear()+'-'+(d.getMonth()+1+'').padStart(2,'0')+'-'+(d.getDate()+'').padStart(2,'0');}

  var H=S.habits||{};
  var AH=S.adminHabits||{};
  var myH=H[me.id]||{};
  // visibility: S.habits.__vis[memberId][habitId] = true/false
  var VIS=(H.__vis&&H.__vis[me.id])||{};

  var h='<div class="stack">';
  h+='<div style="display:flex;gap:6px;margin-bottom:4px;">';
  h+='<button class="abtn sm'+(S.habitTab==='my'?'':' sec')+'" data-htab="my">рҹҢұ лӮҙ мҠөкҙҖ</button>';
  h+='<button class="abtn sm'+(S.habitTab==='all'?'':' sec')+'" data-htab="all">рҹ‘Ҙ м „мІҙ нҳ„нҷ©</button>';
  if(ia)h+='<button class="abtn sm'+(S.habitTab==='admin'?'':' sec')+'" data-htab="admin">вҡҷпёҸ мҠөкҙҖ кҙҖлҰ¬</button>';
  h+='</div>';

  // в”Җв”Җ кҙҖлҰ¬мһҗ мҠөкҙҖ кҙҖлҰ¬ нғӯ в”Җв”Җ
  if(S.habitTab==='admin'&&ia){
    h+='<div class="sec rb" style="padding:.875rem;">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--pr);margin-bottom:8px;">вһ• кіөмҡ© мҠөкҙҖ м¶”к°Җ</div>';
    h+='<div style="display:flex;gap:8px;margin-bottom:8px;">';
    h+='<input class="ainp" id="admin-habit-name" placeholder="кіөмҡ© мҠөкҙҖ мқҙлҰ„" style="flex:1;font-size:13px;" maxlength="30">';
    h+='<button class="abtn sm" id="admin-habit-add-btn">м¶”к°Җ</button>';
    h+='</div></div>';

    var ahIds=Object.keys(AH);
    if(!ahIds.length){
      h+='<div class="sec rb" style="text-align:center;padding:1.5rem;color:var(--mu);font-size:13px;">кіөмҡ© мҠөкҙҖмқҙ м—Ҷм–ҙмҡ”</div>';
    } else {
      ahIds.forEach(function(ahid){
        var ah=AH[ahid];if(!ah)return;
        var enrolled=(ah.members||[]);
        h+='<div class="sec rb" style="padding:.875rem;margin-bottom:0;">';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
        h+='<span style="flex:1;font-size:14px;font-weight:700;">'+esc(ah.name)+'</span>';
        h+='<span style="font-size:11px;color:var(--mu);">'+enrolled.length+'лӘ… мӢ мІӯмӨ‘</span>';
        h+='<button data-admin-habit-del="'+ahid+'" style="font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid #FECACA;background:#FFF5F5;color:var(--rd);cursor:pointer;">мӮӯм ң</button>';
        h+='</div>';
        // л©ӨлІ„лі„ кіөк°ң/л№„кіөк°ң м„Өм •
        if(enrolled.length){
          h+='<div style="font-size:11px;color:var(--mu);margin-bottom:6px;">л©ӨлІ„лі„ кіөк°ң м„Өм •</div>';
          h+='<div style="display:flex;flex-wrap:wrap;gap:4px;">';
          enrolled.forEach(function(mid){
            var mem=S.members.filter(function(x){return x.id===mid;})[0];
            if(!mem)return;
            var vis=AH[ahid].visibility&&AH[ahid].visibility[mid];
            h+='<button data-admin-vis="'+ahid+'__'+mid+'" style="font-size:10px;padding:2px 8px;border-radius:20px;border:1.5px solid '+(vis?'var(--pr)':'var(--br)')+';background:'+(vis?'var(--prl)':'var(--wh)')+';color:'+(vis?'var(--pr)':'var(--mu)')+';cursor:pointer;">'+esc(mem.name)+' '+(vis?'рҹҢҚ':'рҹ”’')+'</button>';
          });
          h+='</div>';
        }
        h+='</div>';
      });
    }
    return h+'</div>';
  }

  // в”Җв”Җ лӮҙ мҠөкҙҖ нғӯ в”Җв”Җ
  if(S.habitTab==='my'){
    // к°ңмқё мҠөкҙҖ м¶”к°Җ
    h+='<div class="sec rb" style="padding:.875rem;">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--pr);margin-bottom:8px;">вңЁ лӮҙ мҠөкҙҖ м¶”к°Җ</div>';
    h+='<div style="display:flex;gap:8px;">';
    h+='<input class="ainp" id="habit-name-inp" placeholder="мғҲ мҠөкҙҖ (мҳҲ: л¬ј 2L л§ҲмӢңкё°)" style="flex:1;font-size:13px;" maxlength="30">';
    h+='<button class="abtn sm" id="habit-add-btn">м¶”к°Җ</button>';
    h+='</div></div>';

    // кіөмҡ© мҠөкҙҖ мӢ мІӯ к°ҖлҠҘ лӘ©лЎқ
    var availAH=Object.keys(AH).filter(function(ahid){return AH[ahid]&&!(AH[ahid].members||[]).includes(me.id);});
    if(availAH.length){
      h+='<div class="sec rb" style="padding:.875rem;">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--pr);margin-bottom:8px;">рҹ“Ӣ кіөмҡ© мҠөкҙҖ мӢ мІӯ</div>';
      availAH.forEach(function(ahid){
        var ah=AH[ahid];
        h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F3F4F6;">';
        h+='<span style="flex:1;font-size:13px;font-weight:600;">'+esc(ah.name)+'</span>';
        h+='<span style="font-size:11px;color:var(--mu);">'+(ah.members||[]).length+'лӘ… м°ём—¬мӨ‘</span>';
        h+='<button class="abtn sm" data-admin-habit-join="'+ahid+'">мӢ мІӯн•ҳкё°</button>';
        h+='</div>';
      });
      h+='</div>';
    }

    // лӮҙк°Җ мӢ мІӯн•ң кіөмҡ© мҠөкҙҖ
    var myAH=Object.keys(AH).filter(function(ahid){return AH[ahid]&&(AH[ahid].members||[]).includes(me.id);});

    // к°ңмқё мҠөкҙҖ + кіөмҡ© мҠөкҙҖ н•©міҗм„ң н‘ңмӢң
    var allHabits=[];
    Object.keys(myH).forEach(function(hid){if(myH[hid])allHabits.push({hid:hid,hab:myH[hid],isAdmin:false});});
    myAH.forEach(function(ahid){if(AH[ahid])allHabits.push({hid:ahid,hab:AH[ahid],isAdmin:true});});

    if(!allHabits.length){
      h+='<div class="sec rb" style="text-align:center;padding:2rem;color:var(--mu);font-size:13px;">м•„м§Ғ л“ұлЎқлҗң мҠөкҙҖмқҙ м—Ҷм–ҙмҡ” рҹҢұ</div>';
    } else {
      allHabits.forEach(function(item){
        var hid=item.hid,hab=item.hab,isAdmin=item.isAdmin;
        var checks=isAdmin?(H[me.id]&&H[me.id]['__admin__'+hid]&&H[me.id]['__admin__'+hid].checks)||{}:hab.checks||{};
        var comments=isAdmin?(H[me.id]&&H[me.id]['__admin__'+hid]&&H[me.id]['__admin__'+hid].comments)||{}:hab.comments||{};
        // кіөк°ң м—¬л¶Җ - к°ңмқёмқҙ м§Ғм ‘ м„Өм • or кҙҖлҰ¬мһҗк°Җ м„Өм •
        var myVis=isAdmin?(AH[hid].visibility&&AH[hid].visibility[me.id]):VIS[hid];
        var isPublic=myVis===true;
        var checkedToday=checks[todayKey]===true;
        var isMonthView=S.habitView===('month__'+hid);
        var isEditDay=S.editHabitDay&&S.editHabitDay.startsWith(hid+'__');
        var editDk=isEditDay?S.editHabitDay.split('__')[1]:null;

        // мЈјмӨ‘л§Ң лӢ¬м„ұлҘ  кі„мӮ°
        var streak=0,totalWd=0,doneWd=0,bonusWe=0;
        for(var i=0;i<30;i++){
          var dd=new Date(today);dd.setDate(dd.getDate()-i);
          var dk2=dateKey(dd);
          var done2=checks[dk2];
          if(isOff(dd)){if(done2)bonusWe++;continue;}
          totalWd++;
          if(done2)doneWd++;
        }
        for(var i=0;i<365;i++){
          var dd=new Date(today);dd.setDate(dd.getDate()-i);
          if(isOff(dd))continue; // мЈјл§җ м—°мҶҚ streakм—җм„ң м ңмҷё
          if(checks[dateKey(dd)])streak++;else break;
        }
        var pct=totalWd?Math.round(doneWd/totalWd*100):0;

        h+='<div class="sec rb" style="padding:.875rem;'+(checkedToday?'border:1.5px solid var(--pr);background:var(--prl);':'')+'margin-bottom:0;">';

function xCsv(){

      var img=new Image();
      img.onload=function(){
        var MAX=900;var w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
        var out=cv.toDataURL('image/jpeg',0.6);
        if(out.length>500000){out=cv.toDataURL('image/jpeg',0.4);}
        if(out.length>700000){alert('мқҙлҜём§Җк°Җ л„Ҳл¬ҙ м»Өмҡ”. лҚ” мһ‘мқҖ мқҙлҜём§ҖлҘј мӮ¬мҡ©н•ҙмЈјм„ёмҡ”.');return;}
        cb(out);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }

    if(!confirm('['+s.name+'] м°ём—¬ л©ӨлІ„ '+enrolled.length+'лӘ… Г— м—ҙлҰ° мЈјм°Ё '+open.length+'к°ң\nмҙқ '+(enrolled.length*open.length)+'к°ңлҘј м „мІҙ мқёмҰқмҷ„лЈҢ мІҳлҰ¬н• к№Ңмҡ”?'))return;
    enrolled.forEach(function(m){
      open.forEach(function(w){setCk(sid,w.num,m.id,'done');});
    });
    persist();
  });});
  qsa('[data-sasgn]',function(el){el.addEventListener('change',function(e){
    var p=e.target.dataset.sasgn.split('__');var sid=p[0],mid=p[1];
    var m=S.members.filter(function(x){return x.id===mid;})[0];if(!m)return;
    m.studyIds=m.studyIds||[];
    if(e.target.checked){if(m.studyIds.indexOf(sid)<0)m.studyIds.push(sid);}
    else m.studyIds=m.studyIds.filter(function(x){return x!==sid;});persist();
  });});
}
function doAM(){
  var n=S.newMember.trim();if(!n){render();return;}
  if(S.members.filter(function(m){return m.name===n;}).length){alert('мқҙлҜё к°ҷмқҖ мқҙлҰ„мқҳ л©ӨлІ„к°Җ мһҲм–ҙмҡ”!');return;}
  var pwEl=document.getElementById('nm-pw');
  var pw=pwEl&&pwEl.value.trim()?pwEl.value.trim():'0000';
  var cbs=document.querySelectorAll('.nm-study-cb:checked');
  var studyIds=[];cbs.forEach(function(cb){studyIds.push(cb.value);});
  S.members.push({id:uid(),name:n,pw:pw,studyIds:studyIds});
  S.members.sort(function(a,b){try{return a.name.localeCompare(b.name,'ko');}catch(e){return a.name<b.name?-1:a.name>b.name?1:0;}});
  S.newMember='';persist();
}
function doDM(id){
  if(!confirm('мқҙ л©ӨлІ„лҘј мӮӯм ңн• к№Ңмҡ”?'))return;
  S.members=S.members.filter(function(m){return m.id!==id;});
  if(S.expandedMem===id)S.expandedMem=null;persist();
}
async function persist(){
  S.saving=true;render();
  try{await fbSave({studies:S.studies,members:S.members,checkins:S.checkins,catOrder:S.catOrder,events:S.events});}
  catch(e){alert('м ҖмһҘ мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');}
  S.saving=false;render();
}
async function persistNotices(){
  try{await fbSaveNotices(S.notices);}
  catch(e){alert('кіөм§Җ м ҖмһҘ мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');}
  render();
}
function applyData(d){
  S.studies=d&&d.studies&&d.studies.length?d.studies:JSON.parse(JSON.stringify(DEFAULT_STUDIES));
  var dbMems=d&&d.members&&d.members.length?d.members:[];
  if(dbMems.length){
    var exIds=dbMems.map(function(m){return m.id;});var exNames=dbMems.map(function(m){return m.name;});
    DEFAULT_MEMBERS.forEach(function(dm){if(exIds.indexOf(dm.id)<0&&exNames.indexOf(dm.name)<0)dbMems.push(JSON.parse(JSON.stringify(dm)));});
    S.members=dbMems;
  } else {S.members=JSON.parse(JSON.stringify(DEFAULT_MEMBERS));}
  S.checkins=d&&d.checkins?d.checkins:{};
  S.studies.forEach(function(s){
    if(!s.weeks||!s.weeks.length)s.weeks=[{num:1,locked:false,materialUrl:''}];
    if(s.applyOpen===undefined)s.applyOpen=false;
    if(s.dayOfWeek===undefined)s.dayOfWeek='';
    if(s.bandUrl===undefined)s.bandUrl='';
    if(s.startDate===undefined)s.startDate='';
    if(!s.snotices)s.snotices=[];
    s.weeks.forEach(function(w){if(w.materialUrl===undefined)w.materialUrl='';if(w.note===undefined)w.note='';});
  });
  // catOrder: Firebaseм—җ м ҖмһҘлҗң мҲңм„ң лЎңл“ң, м—Ҷмңјл©ҙ studiesм—җм„ң м¶”м¶ң
  var allCats=[];S.studies.forEach(function(s){if(allCats.indexOf(s.cat)<0)allCats.push(s.cat);});
  var savedOrder=d&&d.catOrder&&d.catOrder.length?d.catOrder:[];
  // м ҖмһҘлҗң мҲңм„ң кё°мӨҖмңјлЎң м •л ¬, мғҲ м№ҙн…Ңкі лҰ¬лҠ” л§Ё л’Өм—җ м¶”к°Җ
  S.events=d&&d.events?d.events:{};
  S.catOrder=savedOrder.filter(function(c){return allCats.indexOf(c)>=0;});
  allCats.forEach(function(c){if(S.catOrder.indexOf(c)<0)S.catOrder.push(c);});
  S.members.sort(function(a,b){try{return a.name.localeCompare(b.name,'ko');}catch(e){return a.name<b.name?-1:a.name>b.name?1:0;}});
  S.loading=false;render();
}
(async function(){
  render();
  var coreData=null;
  try{coreData=await fbLoad();}
  catch(e1){
    // 1нҡҢ мһ¬мӢңлҸ„
    try{await new Promise(function(r){setTimeout(r,1500);});coreData=await fbLoad();}
    catch(e2){
      S.loading=false;
      var app=document.getElementById('app');
      if(app)app.innerHTML='<div class="loading">лЎңл“ң мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҳкі  мғҲлЎңкі м№Ён•ҙмЈјм„ёмҡ”.<br><br><button onclick="location.reload()" style="padding:.6rem 1.25rem;border-radius:20px;background:linear-gradient(135deg,#E91E8C,#7B2FF7);color:#fff;border:none;font-weight:700;cursor:pointer;">мғҲлЎңкі м№Ё</button></div>';
      return;
    }
  }
  applyData(coreData);
  // кіөм§Җ(мқҙлҜём§Җ нҸ¬н•Ё)лҠ” лі„лҸ„ кІҪлЎңм—җм„ң л№„лҸҷкё°лЎң, мӢӨнҢЁн•ҙлҸ„ м•ұмқҖ м •мғҒ мһ‘лҸҷ
  fbLoadNotices().then(function(nd){S.notices=nd||{};render();}).catch(function(){S.notices={};});
})();


</script>
