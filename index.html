<style>:root{--pr:#E91E8C;--prl:#FDE8F4;--bl:#3B82F6;--bll:#EFF6FF;--bld:#2563EB;--gr:#22C55E;--grb:#F0FDF4;--or:#F59E0B;--orb:#FFFBEB;--rd:#EF4444;--bg:#FDF5FB;--bgd:#FAE8F5;--wh:#fff;--tx:#2D2D2D;--mu:#9CA3AF;--br:#F3D0E9;--r:14px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:2.5rem}
.wrap{max-width:520px;margin:0 auto;padding:.75rem}
.hd{background:linear-gradient(135deg,#E91E8C,#7B2FF7 60%,#3B82F6);border-radius:22px;padding:1.25rem 1.5rem;margin-bottom:1rem;color:#fff;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:0 6px 24px rgba(233,30,140,.25)}
.hd-left .hd-tag{font-size:11px;opacity:.85;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
.hd-left .hd-title{font-size:20px;font-weight:700}
.hd-sub{margin-top:6px;font-size:12px;opacity:.8}
.hd-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;margin-top:2px}
.hd-user{background:rgba(255,255,255,.25);border-radius:16px;padding:3px 10px;font-size:12px;font-weight:600}
.hd-btn{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer}
.tabs{display:flex;gap:5px;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}

.tab{flex:0 0 auto;padding:.45rem .75rem;border-radius:20px;border:1.5px solid var(--br);background:var(--wh);color:var(--mu);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--pr),#7B2FF7);color:#fff;border-color:transparent;font-weight:700;box-shadow:0 2px 10px rgba(233,30,140,.3)}
.tab.at{border-color:#CDDFFE;color:var(--bl)}
.tab.at.on{background:linear-gradient(135deg,var(--bl),#7B2FF7);color:#fff;border-color:transparent}
.card{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);padding:.75rem 1rem;box-shadow:0 2px 12px rgba(233,30,140,.07)}
.sec{background:linear-gradient(135deg,#FDE8F4,#EFF6FF);border-radius:var(--r);padding:1rem 1.125rem;border:1.5px solid #E8C8F0}

.bw{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--orb);color:#D97706;white-space:nowrap;border:1px solid #FDE68A}
.wbdg{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--prl);color:var(--pr);font-weight:700;border:1px solid var(--br)}
.sbtn{font-size:12px;padding:6px 11px;border-radius:20px;border:1.5px solid var(--br);background:var(--wh);cursor:pointer;color:var(--mu);font-weight:500}
.sbtn.done{background:var(--grb);border-color:#BBF7D0;color:#16A34A;font-weight:700}
.sbtn.vac{background:var(--bll);border-color:#BFDBFE;color:var(--bld);font-weight:700}
.ir{display:flex;gap:8px;margin-bottom:10px}

.ir input:focus,.ainp:focus{outline:none;border-color:var(--pr)}
.abtn{padding:.6rem 1rem;border-radius:var(--rs);background:linear-gradient(135deg,var(--pr),#7B2FF7);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.abtn.sec{background:var(--bgd);color:var(--pr);border:1.5px solid var(--br)}
.abtn.full{width:100%;padding:.875rem;border-radius:var(--r);font-size:15px}
.abtn.sm{padding:.4rem .75rem;font-size:12px;border-radius:var(--rs)}
.st{font-size:14px;font-weight:700;margin-bottom:10px}
.dlb{background:none;border:none;cursor:pointer;color:#F9A8D4;font-size:16px;padding:0 2px}
.actb{font-size:12px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--bl);background:var(--bll);cursor:pointer;color:var(--bl);font-weight:600}
.ws{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--br);background:var(--wh);cursor:pointer;font-size:16px;color:var(--pr);font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.stog{display:flex;align-items:center;justify-content:space-between;padding:.55rem .875rem;border-radius:var(--rs);background:var(--wh);font-size:13px;margin-bottom:5px;border:1.5px solid #F3D0E9}
.tgl{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:linear-gradient(135deg,var(--pr),#7B2FF7)}.tgl.off{background:#E5E7EB}

.sc-label{display:flex;align-items:center;gap:8px;padding:.45rem .5rem;font-size:13px;cursor:pointer;border-radius:8px}
.sc-label:hover{background:var(--prl)}

.cat-hd{font-size:11px;font-weight:700;color:var(--pr);letter-spacing:.05em;padding:.4rem 0 .2rem}
.mexp{border:1.5px solid #F9A8D4;border-radius:var(--r);overflow:hidden;margin-top:4px}
.mexp-hd{background:var(--prl);padding:.65rem 1rem;font-size:13px;font-weight:700;color:var(--pr)}
.mexp-body{padding:.5rem 1rem 1rem}
select{width:100%;padding:.65rem .875rem;border-radius:var(--rs);border:1.5px solid var(--br);font-size:14px;background:var(--wh);color:var(--tx)}
select:focus{outline:none;border-color:var(--pr)}
.loading{text-align:center;padding:3rem 1rem;color:var(--mu);font-size:14px}
.sp{width:30px;height:30px;border:3px solid #F9D0ED;border-top-color:var(--pr);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--mu);font-size:14px;padding:1.5rem 0}
.login-wrap{padding:.5rem 0}
.login-box{background:var(--wh);border:1.5px solid var(--br);border-radius:20px;padding:1.5rem;max-width:380px;margin:0 auto;box-shadow:0 2px 16px rgba(233,30,140,.1)}
.login-box h2{font-size:17px;text-align:center;margin-bottom:4px;font-weight:700}
.login-box p{font-size:13px;color:var(--mu);text-align:center;margin-bottom:1.25rem;line-height:1.6}
.lstack{display:flex;flex-direction:column;gap:10px}
.err{font-size:13px;color:var(--pr);text-align:center}
.ok{font-size:13px;color:var(--gr);text-align:center;font-weight:600}
.stat-box{flex:1;text-align:center;background:var(--wh);border-radius:var(--rs);padding:.875rem .5rem;border:1.5px solid #F3D0E9}
.stat-num{font-size:22px;font-weight:700;margin-top:4px}
.stat-label{font-size:11px;color:var(--mu);font-weight:500}
.fbox{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);padding:1rem}
.fg{flex:1;min-width:120px}
.fg label{font-size:11px;color:var(--mu);display:block;margin-bottom:4px;font-weight:600}
.rsum{display:flex;gap:6px;margin-bottom:8px}
.rsbox{flex:1;text-align:center;background:var(--prl);border-radius:var(--rs);padding:.5rem .25rem;border:1px solid var(--br)}
.rsnum{font-size:18px;font-weight:700}.rslbl{font-size:10px;color:var(--mu)}
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable th{background:var(--prl);color:var(--pr);font-weight:700;padding:.45rem .6rem;text-align:left;border-bottom:1.5px solid var(--br);white-space:nowrap}
.rtable td{padding:.4rem .6rem;border-bottom:1px solid #F9EDF5;vertical-align:middle}
.rtable tr:last-child td{border-bottom:none}
.tscroll{overflow-x:auto;border-radius:var(--r);border:1.5px solid #F3D0E9;max-height:400px;overflow-y:auto}
.mprog{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);padding:.875rem 1rem;cursor:pointer}
.mprog:hover{border-color:var(--pr)}
.wk-chip{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap;border:1.5px solid transparent}
.wk-open{background:var(--prl);color:var(--pr);border-color:var(--pr)}
.wk-locked{background:#F3F4F6;color:var(--mu);border-color:#E5E7EB}
.lock-btn{font-size:11px;padding:3px 8px;border-radius:20px;border:1.5px solid;cursor:pointer;font-weight:600}
.lock-btn.locked{background:#F3F4F6;color:var(--mu);border-color:#E5E7EB}
.lock-btn.open{background:var(--grb);color:var(--gr);border-color:#BBF7D0}
.add-wk-btn{font-size:12px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--pr);background:var(--prl);color:var(--pr);cursor:pointer;font-weight:600;white-space:nowrap}
.stab-btn{flex:0 0 auto;padding:.4rem .875rem;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1.5px solid var(--br);background:var(--wh);color:var(--mu)}
.stab-btn.on{border-color:var(--pr);background:var(--prl);color:var(--pr);font-weight:700}
.apply-card{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);padding:.875rem 1rem}
.wk-curweek{background:linear-gradient(135deg,#F59E0B,#EF4444)!important;color:#fff!important;border-color:transparent!important;font-weight:800!important;box-shadow:0 2px 10px rgba(245,158,11,.5)!important;animation:pulse-wk 1.5s ease-in-out infinite!important;}
@keyframes pulse-wk{0%,100%{box-shadow:0 2px 10px rgba(245,158,11,.4);}50%{box-shadow:0 2px 18px rgba(245,158,11,.8);}}
.scard{background:var(--wh);border:1.5px solid #F3D0E9;border-radius:var(--r);overflow:hidden;transition:opacity .15s}
.scard.dragging{opacity:.4}
.scard.dragover{border-top:3px solid var(--pr)}
.drag-handle{font-size:18px;color:var(--mu);cursor:grab;flex-shrink:0;user-select:none}
.sinp-name{flex:1;font-size:13px;font-weight:600;border:none;background:transparent;outline:none;min-width:0;padding:2px 4px;border-radius:4px;color:var(--tx)}
.sinp-name:focus{background:var(--prl)}</style>

<body>
<div class="wrap" id="app"></div>
<script>

const DEFAULT_MEMBERS=[];
function mkS(id,name,cat){return {id:id,name:name,cat:cat,active:true,applyOpen:false,dayOfWeek:'',bandUrl:'',startDate:'',snotices:[],weeks:[{num:1,locked:false,materialUrl:''}]};}
const DEFAULT_STUDIES=[
  mkS('s01','м—„м„ёмҠӨ мҠҲмӢ¬мҶЎ','мһ…л¬ёмҠӨн„°л””'),mkS('s02','мҠҲмӢ¬мҶЎ н”ҢлЎұ1','мһ…л¬ёмҠӨн„°л””'),
  mkS('s03','лІ мқҙл№„л§ҲлҚ”кө¬мҠӨ','м—„м„ёмҠӨ'),mkS('s04','н”„лў°лІЁл§ҲлҚ”кө¬мҠӨ 30','м—„м„ёмҠӨ'),
  mkS('s05','н”„лў°лІЁл§ҲлҚ”кө¬мҠӨ 90','м—„м„ёмҠӨ'),mkS('s06','л…ёлІ лІ  л§ҲлҚ”кө¬мҠӨ','м—„м„ёмҠӨ'),
  mkS('s07','л…ёлІ лІ ','м—„м„ёмҠӨ'),mkS('s08','мҳҒм•„лӢӨмӨ‘','м—„м„ёмҠӨ'),mkS('s09','л§җн•ҳкё°','м—„м„ёмҠӨ'),
  mkS('s10','лҸҢмһЎмқҙм „м§‘','л°©м¶ңмҠӨн„°л””'),mkS('s11','н”Ңл ҲмқҙнҢ©нҶ 1,2','л°©м¶ңмҠӨн„°л””'),
  mkS('s12','к·ёлһҳк·ёлһҳ','л°©м¶ңмҠӨн„°л””'),mkS('s13','л§ҲнҚјмӣ” лҲ„лҰ¬м—°кі„(8мЈј)','л°©м¶ңмҠӨн„°л””')
];

const ADMIN_PW='2323';
const DB_PATH='/studydata_new.json';
const FIREBASE_URL='https://kkang-twins-default-rtdb.firebaseio.com';

const NOTICES_PATH=DB_PATH.replace('.json','_notices.json');
function fbLoad(){return fetch(FIREBASE_URL+DB_PATH).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).then(function(d){return d||{};});}
function fbSave(d){return fetch(FIREBASE_URL+DB_PATH,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw new Error(r.status);});}
function fbLoadNotices(){
  return fetch(FIREBASE_URL+NOTICES_PATH).then(function(r){if(!r.ok)return{};return r.json();}).then(function(d){return d||{};}).catch(function(){return{};});
}
function fbSaveNotices(d){
  return fetch(FIREBASE_URL+NOTICES_PATH,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw new Error(r.status);});
}
function ckKey(sid,wn,mid){return sid+'__'+wn+'__'+mid;}
function ck(sid,wn,mid){return S.checkins[ckKey(sid,wn,mid)]||null;}
function setCk(sid,wn,mid,val){var k=ckKey(sid,wn,mid);if(val)S.checkins[k]=val;else delete S.checkins[k];}
function allWeeks(s){return s.weeks||[];}
function openWeeks(s){return allWeeks(s).filter(function(w){return !w.locked;});}
function mCurSt(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;});
  var dn=0,tot=0;
  my.forEach(function(s){openWeeks(s).forEach(function(w){tot++;if(ck(s.id,w.num,m.id)==='done')dn++;});});
  return{total:tot,done:dn,pct:tot?Math.round(dn/tot*100):0};
}
function getCurrentWeek(s){
  if(!s.startDate)return 0;
  var start=new Date(s.startDate);start.setHours(0,0,0,0);
  var now=new Date();now.setHours(0,0,0,0);
  var diff=now-start;
  if(diff<0)return 0;
  return Math.floor(diff/(7*24*60*60*1000))+1;
}
function isStudyComplete(s,m){
  var aw=allWeeks(s);
  return aw.length>0&&aw.every(function(w){return ck(s.id,w.num,m.id)==='done';});
}
function mTotSt(m){
  var my=S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;});
  var tw=0,dw=0,vw=0;
  my.forEach(function(s){allWeeks(s).forEach(function(w){tw++;var st=ck(s.id,w.num,m.id);if(st==='done')dw++;else if(st==='vacation')vw++;});});
  return{tw:tw,dw:dw,vw:vw,pct:tw?Math.round(dw/tw*100):0,cnt:my.length};
}
function sMSt(s,m){
  var aw=allWeeks(s);var dn=0,vc=0;
  aw.forEach(function(w){var st=ck(s.id,w.num,m.id);if(st==='done')dn++;else if(st==='vacation')vc++;});
  return{t:aw.length,dn:dn,vc:vc,pct:aw.length?Math.round(dn/aw.length*100):0};
}
var S={
  tab:'ci',studies:[],members:[],checkins:{},loading:true,saving:false,
  isAdmin:false,loggedMember:null,adminErr:'',memberErr:'',selMemId:'',
  newMember:'',expandedMem:null,expandedStudy:null,
  chgErr:'',chgOk:'',viewMemberId:null,
  settingsTab:'study',expandedWeek:null,expandedCI:{},dragSid:null,catOrder:[],expandedCat:{},
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),events:{},notices:{},
  editNoticeId:null,expandedNotice:{},expandedSnotice:{},editSnoticeId:null,expandedWnote:{},expandedStudyMem:{},editNoticeId:null,expandedNotice:{},
  rptMode:'study',rptSid:'',rptMid:'',rptWeek:'',editKey:null
};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function g(id){return document.getElementById(id);}
function on(id,fn){var el=g(id);if(el)el.addEventListener('click',fn);}
function qsa(sel,fn){document.querySelectorAll(sel).forEach(fn);}
function render(){
  var app=document.getElementById('app');if(!app)return;
  if(S.loading){app.innerHTML='<div class="loading"><div class="sp"></div>л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>';return;}
  app.innerHTML=rApp();bAll();
}
// м•ұ л ҲлІЁ мқҙлІӨнҠё мң„мһ„ (re-render нӣ„м—җлҸ„ н•ӯмғҒ лҸҷмһ‘)
document.addEventListener('click',function(e){
  var expci=e.target.closest&&e.target.closest('[data-expci]');
  if(expci){e.stopPropagation();var id=expci.dataset.expci;S.expandedCI[id]=!S.expandedCI[id];render();return;}
  var wnttog=e.target.closest&&e.target.closest('[data-wnttog]');
  if(wnttog){e.stopPropagation();var wk=wnttog.dataset.wnttog;S.expandedWnote[wk]=!S.expandedWnote[wk];render();return;}
  var allopen=e.target.closest&&e.target.closest('[data-allopen]');
  if(allopen){e.stopPropagation();var s=S.studies.filter(function(x){return x.id===allopen.dataset.allopen;})[0];if(s&&s.weeks){s.weeks.forEach(function(w){w.locked=false;});persist();}return;}
  var alllock=e.target.closest&&e.target.closest('[data-alllock]');
  if(alllock){e.stopPropagation();var s2=S.studies.filter(function(x){return x.id===alllock.dataset.alllock;})[0];if(s2&&s2.weeks){s2.weeks.forEach(function(w){w.locked=true;});persist();}return;}
});

function rApp(){
  var ia=S.isAdmin,im=!!S.loggedMember;
  var h='<div class="hd"><div class="hd-left"><div class="hd-tag">@kkang_twins_</div><div class="hd-title">мұ…мңЎм•„ мҠӨн„°л””</div>'+
    '</div>'+
    '<div class="hd-right">';
  if(ia)h+='<span class="hd-user">кҙҖлҰ¬мһҗ</span><button class="hd-btn" id="lo">лЎңк·ём•„мӣғ</button>';
  else if(im)h+='<span class="hd-user">'+esc(S.loggedMember.name)+'</span><button class="hd-btn" id="lo">лЎңк·ём•„мӣғ</button>';
  else h+='<button class="hd-btn" id="mlb">лЎңк·ёмқё</button><button class="hd-btn" id="alb" style="font-size:10px;opacity:.75;">кҙҖлҰ¬мһҗ</button>';
  h+='</div></div>';
  h+='<div class="tabs">';
  if(im||ia)h+='<button class="tab'+(S.tab==='ci'?' on':'')+'" data-tab="ci">вң… лӮҙ мқёмҰқ</button>';
  if(im)h+='<button class="tab'+(S.tab==='mp'?' on':'')+'" data-tab="mp">рҹ“Ҳ лӮҙ нҳ„нҷ©</button>';
  if(im)h+='<button class="tab'+(S.tab==='apply'?' on':'')+'" data-tab="apply">рҹ“қ мҠӨн„°л”” мӢ мІӯ</button>';
  if(im||ia)h+='<button class="tab'+(S.tab==='notice'?' on':'')+'" data-tab="notice">рҹ“ў кіөм§Җ</button>';
  if(im||ia)h+='<button class="tab'+(S.tab==='cal'?' on':'')+'" data-tab="cal">рҹ“… мқјм •</button>';
  if(im)h+='<button class="tab'+(S.tab==='cp'?' on':'')+'" data-tab="cp">рҹ”‘ л№„лІҲліҖкІҪ</button>';
  if(ia)h+='<button class="tab at'+(S.tab==='overall'?' on':'')+'" data-tab="overall">рҹ“Ҡ м „мІҙнҳ„нҷ©</button>';

      '</div>';

  }
  return h+'</div>';

    if(vm){
      var vmy=S.studies.filter(function(s){return s.active&&(vm.studyIds||[]).indexOf(s.id)>=0;});
      var vtot=mTotSt(vm);
      var h='<div class="stack"><div class="sec rb" style="padding:.875rem 1rem;">'+
        '<div><div style="font-size:15px;font-weight:700;">'+esc(vm.name)+'лӢҳ мқёмҰқ нҳ„нҷ©</div>'+
          '<div style="font-size:12px;color:var(--mu);margin-top:2px;">лҲ„м Ғ вң…'+vtot.dw+'/'+vtot.tw+'мЈј В· '+vtot.pct+'%</div></div>'+

      vmy.forEach(function(s){

        h+='<div class="card" style="padding:.875rem 1rem;"><div style="font-size:14px;font-weight:600;margin-bottom:8px;">'+esc(s.name)+'</div>';

          h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'+
            '<span class="wk-chip '+(isOpen?'wk-open':'wk-locked')+'">'+(isOpen?'рҹ”“':'рҹ”’')+' '+w.num+'мЈјм°Ё</span>';
          if(isOpen){
            h+='<button class="sbtn'+(status==='done'?' done':'')+'" data-ack="'+vm.id+'__'+s.id+'__'+w.num+'__done">вң…</button>'+
              '<button class="sbtn'+(status==='vacation'?' vac':'')+'" data-ack="'+vm.id+'__'+s.id+'__'+w.num+'__vacation">рҹҸ–пёҸ</button>'+
              (status?'<button class="sbtn" data-ack="'+vm.id+'__'+s.id+'__'+w.num+'__none" style="font-size:11px;">вң•</button>':'');
          } else {
            h+=(status==='done'?'<span class="bd">вң“</span>':status==='vacation'?'<span class="bv">рҹҸ–пёҸ</span>':'<span style="font-size:11px;color:var(--mu);">лҜёмқёмҰқ</span>');
          }
          h+='</div>';
        });
        h+='</div>';
      });
      return h+'</div>';
    }
  }
  var ad=S.members.filter(function(m){var s=mCurSt(m);return s.total>0&&s.done===s.total;}).length;

  // в”Җв”Җ м•ҢлҰј нҢЁл„җ в”Җв”Җ
  var now=new Date();
  var todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  // мқҙлІҲмЈј мӣ”мҡ”мқј~мқјмҡ”мқј
  var weekDay=now.getDay();var mondayOff=weekDay===0?-6:1-weekDay;
  var monday=new Date(now);monday.setDate(now.getDate()+mondayOff);
  var sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  function toStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  var monStr=toStr(monday);var sunStr=toStr(sunday);

  // рҹ”ҙ м—ҙлҰ° мЈјм°Ёк°Җ м—ҶлҠ” нҷңм„ұ мҠӨн„°л””
  var noOpen=S.studies.filter(function(s){return s.active&&openWeeks(s).length===0;});
  // рҹҹЎ мқҙлІҲмЈј мқёмҰқлҘ  0%мқё мҠӨн„°л”” (м—ҙлҰ° мЈјм°Ё мһҲлҠ”лҚ° м•„л¬ҙлҸ„ мқёмҰқ м•Ҳ н•Ё)
  var zeroRate=S.studies.filter(function(s){
    if(!s.active||openWeeks(s).length===0)return false;
    var enrolled=S.members.filter(function(m){return(m.studyIds||[]).indexOf(s.id)>=0;});
    if(!enrolled.length)return false;
    var total=0,done=0;
    enrolled.forEach(function(m){openWeeks(s).forEach(function(w){total++;if(ck(s.id,w.num,m.id)==='done')done++;});});
    return total>0&&done===0;
  });
  // рҹ“… мқҙлІҲмЈј лӢ¬л Ҙ мқјм •
  var weekEvs=Object.values(S.events).filter(function(e){
    var s=e.startDate||e.date;var en=e.endDate||s;
    return s<=sunStr&&en>=monStr;
  }).sort(function(a,b){var sa=a.startDate||a.date;var sb=b.startDate||b.date;return sa>sb?1:-1;});

  var hasAlert=noOpen.length||zeroRate.length||weekEvs.length;
  var h='<div class="stack">';

    if(noOpen.length){
      h+='<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:700;color:var(--rd);margin-bottom:4px;">рҹ”ҙ мЈјм°ЁлҘј м—ҙм–ҙм•ј н•ҙмҡ” ('+noOpen.length+'к°ң)</div>';
      noOpen.forEach(function(s){
        h+='<div style="font-size:12px;padding:.3rem .5rem;background:#FFF5F5;border-radius:8px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;">'+
          '<span>'+esc(s.name)+'<span style="font-size:10px;color:var(--mu);margin-left:4px;">['+esc(s.cat)+']</span></span>'+
          '<span style="font-size:10px;color:var(--rd);">м—ҙлҰ° мЈјм°Ё м—ҶмқҢ</span></div>';
      });
      h+='</div>';
    }
    if(zeroRate.length){
      h+='<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:700;color:var(--or);margin-bottom:4px;">рҹҹЎ мқёмҰқ лҸ…л Ө н•„мҡ” ('+zeroRate.length+'к°ң)</div>';
      zeroRate.forEach(function(s){
        var enrolled=S.members.filter(function(m){return(m.studyIds||[]).indexOf(s.id)>=0;});
        h+='<div style="font-size:12px;padding:.3rem .5rem;background:var(--orb);border-radius:8px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;">'+
          '<span>'+esc(s.name)+'<span style="font-size:10px;color:var(--mu);margin-left:4px;">['+esc(s.cat)+']</span></span>'+
          '<span style="font-size:10px;color:var(--or);">'+enrolled.length+'лӘ… 0% мқёмҰқ</span></div>';
      });
      h+='</div>';
    }
    if(weekEvs.length){
      h+='<div><div style="font-size:12px;font-weight:700;color:var(--bl);margin-bottom:4px;">рҹ“… мқҙлІҲмЈј мқјм • ('+weekEvs.length+'к°ң)</div>';
      weekEvs.forEach(function(ev){
        var sd=ev.startDate||ev.date;var ed=ev.endDate||sd;
        var dateDisplay=sd===ed?sd.slice(5).replace('-','/'):sd.slice(5).replace('-','/')+' ~ '+ed.slice(5).replace('-','/');
        h+='<div style="font-size:12px;padding:.3rem .5rem;background:var(--bll);border-radius:8px;margin-bottom:3px;display:flex;align-items:center;gap:6px;">'+
          '<div style="width:8px;height:8px;border-radius:50%;background:'+ev.color+';flex-shrink:0;"></div>'+
          '<span style="color:var(--mu);white-space:nowrap;">'+dateDisplay+'</span>'+
          '<span style="font-weight:500;">'+esc(ev.title)+'</span></div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }

function bRows(){
  var rows=[];

    ss.forEach(function(s){
      var aw=allWeeks(s);var wks=S.rptWeek?aw.filter(function(w){return w.num===+S.rptWeek;}):aw;
      wks.forEach(function(w){
        S.members.filter(function(m){return(m.studyIds||[]).indexOf(s.id)>=0;}).forEach(function(m){
          rows.push({mem:m.name,mid:m.id,study:s.name,sid:s.id,cat:s.cat,week:w.num,tw:aw.length,locked:w.locked,st:ck(s.id,w.num,m.id)});
        });
      });
    });
  } else {
    var ms=S.rptMid?S.members.filter(function(m){return m.id===S.rptMid;}):S.members;
    ms.forEach(function(m){
      S.studies.filter(function(s){return s.active&&(m.studyIds||[]).indexOf(s.id)>=0;}).forEach(function(s){
        allWeeks(s).forEach(function(w){
          rows.push({mem:m.name,mid:m.id,study:s.name,sid:s.id,cat:s.cat,week:w.num,tw:allWeeks(s).length,locked:w.locked,st:ck(s.id,w.num,m.id)});
        });
      });
    });
  }
  return rows;
}

function bAll(){
  qsa('[data-tab]',function(el){el.addEventListener('click',function(){S.tab=el.dataset.tab;S.chgErr='';S.chgOk='';render();});});
  on('mlb',function(){S.tab='mlogin';render();});on('alb',function(){S.tab='alogin';render();});
  on('lo',function(){S.isAdmin=false;S.loggedMember=null;S.tab='mlogin';render();});
  // мқҙлҜём§Җ м—җлҹ¬ мІҳлҰ¬
  qsa('.notice-img',function(el){el.addEventListener('error',function(){el.style.display='none';});});
  // мқҙлҜём§Җ нҢҢмқј м—…лЎңл“ң
  var ntImgData='';
  function compressImage(file,cb){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var MAX=900;var w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
        var out=cv.toDataURL('image/jpeg',0.6);
        if(out.length>500000){out=cv.toDataURL('image/jpeg',0.4);}
        if(out.length>700000){alert('мқҙлҜём§Җк°Җ л„Ҳл¬ҙ м»Өмҡ”. лҚ” мһ‘мқҖ мқҙлҜём§ҖлҘј мӮ¬мҡ©н•ҙмЈјм„ёмҡ”.');return;}
        cb(out);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }
  function setNtPreview(dataUrl){
    ntImgData=dataUrl;
    var prev=g('nt-preview');var pimg=g('nt-preview-img');
    if(prev&&pimg){pimg.src=dataUrl;prev.style.display='block';}
    var drop=g('nt-drop');if(drop)drop.style.display='none';
  }
  var ntDrop=g('nt-drop');var ntFile=g('nt-file');
  if(ntDrop){
    ntDrop.addEventListener('click',function(){if(ntFile)ntFile.click();});
    ntDrop.addEventListener('dragover',function(e){e.preventDefault();ntDrop.style.borderColor='var(--pr)';});
    ntDrop.addEventListener('dragleave',function(){ntDrop.style.borderColor='var(--br)';});
    ntDrop.addEventListener('drop',function(e){
      e.preventDefault();ntDrop.style.borderColor='var(--br)';
      var f=e.dataTransfer.files[0];
      if(f&&f.type.startsWith('image/')){
        var up=g('nt-uploading');if(up)up.style.display='block';
        compressImage(f,function(d){if(up)up.style.display='none';setNtPreview(d);});
      }
    });
  }
  if(ntFile){ntFile.addEventListener('change',function(e){
    var f=e.target.files[0];if(!f)return;
    var up=g('nt-uploading');if(up)up.style.display='block';
    compressImage(f,function(d){if(up)up.style.display='none';setNtPreview(d);});
  });}
  on('nt-clear-img',function(){
    ntImgData='';
    var prev=g('nt-preview');var drop=g('nt-drop');
    if(prev)prev.style.display='none';if(drop)drop.style.display='block';
    if(ntFile)ntFile.value='';
  });
  // кіөм§Җ л“ұлЎқ
  on('nt-add',function(){
    var ti=g('nt-title');var bo=g('nt-body');
    if(!ti||!ti.value.trim()){alert('м ңлӘ©мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”');return;}
    var id='nt'+Date.now().toString(36);

  qsa('[data-addnext]',function(el){el.addEventListener('click',function(){
    var s=S.studies.filter(function(x){return x.id===el.dataset.addnext;})[0];if(!s)return;
    var aw=s.weeks||[];var next=aw.length?Math.max.apply(null,aw.map(function(x){return x.num;}))+1:1;
    s.weeks.push({num:next,locked:false,materialUrl:''});persist();
  });});
  // мғҲ мҠӨн„°л”” м¶”к°Җ - м№ҙн…Ңкі лҰ¬ м„ нғқ
  var nsCat=g('ns-cat');
  if(nsCat)nsCat.addEventListener('change',function(e){
    var nc=g('ns-newcat');if(nc)nc.style.display=e.target.value==='__new__'?'block':'none';
  });
  on('add-study',function(){
    var ni=g('ns-name');var ci=g('ns-cat');var nci=g('ns-newcat');
    var name=ni?ni.value.trim():'';var cat=ci?ci.value:'';
    if(cat==='__new__'){cat=nci?nci.value.trim():'';}
    if(!name){alert('мҠӨн„°л”” мқҙлҰ„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”');return;}
    if(!cat){alert('м№ҙн…Ңкі лҰ¬лҘј м„ нғқн•ҳкұ°лӮҳ мһ…л Ҙн•ҙмЈјм„ёмҡ”');return;}
    if(S.studies.filter(function(x){return x.name===name;}).length){alert('к°ҷмқҖ мқҙлҰ„мқҙ мқҙлҜё мһҲм–ҙмҡ”!');return;}
    S.studies.push({id:'s'+Date.now().toString(36),name:name,cat:cat,active:true,applyOpen:false,dayOfWeek:'',bandUrl:'',weeks:[{num:1,locked:false,materialUrl:''}]});
    if(S.catOrder.indexOf(cat)<0)S.catOrder.push(cat);
    if(ni)ni.value='';if(ci)ci.value='';if(nci){nci.value='';nci.style.display='none';}persist();
  });
  // л©ӨлІ„ кҙҖлҰ¬
  var nm=g('nm');if(nm){nm.addEventListener('input',function(e){S.newMember=e.target.value;});nm.addEventListener('keydown',function(e){if(e.key==='Enter')doAM();});}
  var nmpw=g('nm-pw');if(nmpw)nmpw.addEventListener('keydown',function(e){if(e.key==='Enter')doAM();});
  on('am',doAM);
  qsa('[data-mren]',function(el){el.addEventListener('change',function(e){
    var newName=e.target.value.trim();if(!newName)return;
    var m=S.members.filter(function(x){return x.id===el.dataset.mren;})[0];if(!m)return;
    if(S.loggedMember&&S.loggedMember.id===m.id)S.loggedMember.name=newName;
    m.name=newName;
    S.members.sort(function(a,b){try{return a.name.localeCompare(b.name,'ko');}catch(e2){return a.name<b.name?-1:1;}});
    persist();
  });});
  qsa('[data-mexp]',function(el){el.addEventListener('click',function(){S.expandedMem=S.expandedMem===el.dataset.mexp?null:el.dataset.mexp;render();});});
  qsa('[data-md]',function(el){el.addEventListener('click',function(){doDM(el.dataset.md);});});
  qsa('[data-asgn]',function(el){el.addEventListener('change',function(e){
    var p=e.target.dataset.asgn.split('__');var mid=p[0],sid=p[1];
    var m=S.members.filter(function(x){return x.id===mid;})[0];if(!m)return;
    m.studyIds=m.studyIds||[];
    if(e.target.checked){if(m.studyIds.indexOf(sid)<0)m.studyIds.push(sid);}
    else m.studyIds=m.studyIds.filter(function(x){return x!==sid;});persist();
  });});
  qsa('[data-ap]',function(el){el.addEventListener('click',function(){
    var mid=el.dataset.ap;var inp=g('ap'+mid);if(!inp)return;
    var nv=inp.value.trim();if(!nv){alert('мғҲ л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”');return;}
    var m=S.members.filter(function(x){return x.id===mid;})[0];if(!m)return;
    m.pw=nv;persist();inp.value='';alert(m.name+'лӢҳ л№„лІҲ ліҖкІҪ мҷ„лЈҢ!');
  });});
  qsa('[data-sexp]',function(el){el.addEventListener('click',function(){S.expandedStudy=S.expandedStudy===el.dataset.sexp?null:el.dataset.sexp;render();});});
  // мҠӨн„°л”” л©ӨлІ„ м„№м…ҳ нҺјм№ҳкё°
  qsa('[data-expsm]',function(el){el.addEventListener('click',function(){
    var sid=el.dataset.expsm;S.expandedStudyMem[sid]=!S.expandedStudyMem[sid];render();
  });});
  // м „мІҙ мқёмҰқмҷ„лЈҢ
  qsa('[data-allck]',function(el){el.addEventListener('click',function(){
    var sid=el.dataset.allck;
    var s=S.studies.filter(function(x){return x.id===sid;})[0];if(!s)return;
    var enrolled=S.members.filter(function(m){return(m.studyIds||[]).indexOf(sid)>=0;});
    var open=openWeeks(s);
    if(!enrolled.length||!open.length){alert('л°°м •лҗң л©ӨлІ„лӮҳ м—ҙлҰ° мЈјм°Ёк°Җ м—Ҷм–ҙмҡ”.');return;}
    if(!confirm('['+s.name+'] м°ём—¬ л©ӨлІ„ '+enrolled.length+'лӘ… Г— м—ҙлҰ° мЈјм°Ё '+open.length+'к°ң\nмҙқ '+(enrolled.length*open.length)+'к°ңлҘј м „мІҙ мқёмҰқмҷ„лЈҢ мІҳлҰ¬н• к№Ңмҡ”?'))return;
    enrolled.forEach(function(m){
      open.forEach(function(w){setCk(sid,w.num,m.id,'done');});
    });
    persist();
  });});
  qsa('[data-sasgn]',function(el){el.addEventListener('change',function(e){
    var p=e.target.dataset.sasgn.split('__');var sid=p[0],mid=p[1];
    var m=S.members.filter(function(x){return x.id===mid;})[0];if(!m)return;
    m.studyIds=m.studyIds||[];
    if(e.target.checked){if(m.studyIds.indexOf(sid)<0)m.studyIds.push(sid);}
    else m.studyIds=m.studyIds.filter(function(x){return x!==sid;});persist();
  });});
}
function doAM(){
  var n=S.newMember.trim();if(!n){render();return;}
  if(S.members.filter(function(m){return m.name===n;}).length){alert('мқҙлҜё к°ҷмқҖ мқҙлҰ„мқҳ л©ӨлІ„к°Җ мһҲм–ҙмҡ”!');return;}
  var pwEl=document.getElementById('nm-pw');
  var pw=pwEl&&pwEl.value.trim()?pwEl.value.trim():'0000';
  var cbs=document.querySelectorAll('.nm-study-cb:checked');
  var studyIds=[];cbs.forEach(function(cb){studyIds.push(cb.value);});
  S.members.push({id:uid(),name:n,pw:pw,studyIds:studyIds});
  S.members.sort(function(a,b){try{return a.name.localeCompare(b.name,'ko');}catch(e){return a.name<b.name?-1:a.name>b.name?1:0;}});
  S.newMember='';persist();
}
function doDM(id){
  if(!confirm('мқҙ л©ӨлІ„лҘј мӮӯм ңн• к№Ңмҡ”?'))return;
  S.members=S.members.filter(function(m){return m.id!==id;});
  if(S.expandedMem===id)S.expandedMem=null;persist();
}
async function persist(){
  S.saving=true;render();
  try{await fbSave({studies:S.studies,members:S.members,checkins:S.checkins,catOrder:S.catOrder,events:S.events});}
  catch(e){alert('м ҖмһҘ мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');}
  S.saving=false;render();
}
async function persistNotices(){
  try{await fbSaveNotices(S.notices);}
  catch(e){alert('кіөм§Җ м ҖмһҘ мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');}
  render();
}
function applyData(d){
  S.studies=d&&d.studies&&d.studies.length?d.studies:JSON.parse(JSON.stringify(DEFAULT_STUDIES));
  var dbMems=d&&d.members&&d.members.length?d.members:[];
  if(dbMems.length){
    var exIds=dbMems.map(function(m){return m.id;});var exNames=dbMems.map(function(m){return m.name;});
    DEFAULT_MEMBERS.forEach(function(dm){if(exIds.indexOf(dm.id)<0&&exNames.indexOf(dm.name)<0)dbMems.push(JSON.parse(JSON.stringify(dm)));});
    S.members=dbMems;
  } else {S.members=JSON.parse(JSON.stringify(DEFAULT_MEMBERS));}
  S.checkins=d&&d.checkins?d.checkins:{};
  S.studies.forEach(function(s){
    if(!s.weeks||!s.weeks.length)s.weeks=[{num:1,locked:false,materialUrl:''}];
    if(s.applyOpen===undefined)s.applyOpen=false;
    if(s.dayOfWeek===undefined)s.dayOfWeek='';
    if(s.bandUrl===undefined)s.bandUrl='';
    if(s.startDate===undefined)s.startDate='';
    if(!s.snotices)s.snotices=[];
    s.weeks.forEach(function(w){if(w.materialUrl===undefined)w.materialUrl='';if(w.note===undefined)w.note='';});
  });
  // catOrder: Firebaseм—җ м ҖмһҘлҗң мҲңм„ң лЎңл“ң, м—Ҷмңјл©ҙ studiesм—җм„ң м¶”м¶ң
  var allCats=[];S.studies.forEach(function(s){if(allCats.indexOf(s.cat)<0)allCats.push(s.cat);});
  var savedOrder=d&&d.catOrder&&d.catOrder.length?d.catOrder:[];
  // м ҖмһҘлҗң мҲңм„ң кё°мӨҖмңјлЎң м •л ¬, мғҲ м№ҙн…Ңкі лҰ¬лҠ” л§Ё л’Өм—җ м¶”к°Җ
  S.events=d&&d.events?d.events:{};
  S.catOrder=savedOrder.filter(function(c){return allCats.indexOf(c)>=0;});
  allCats.forEach(function(c){if(S.catOrder.indexOf(c)<0)S.catOrder.push(c);});
  S.members.sort(function(a,b){try{return a.name.localeCompare(b.name,'ko');}catch(e){return a.name<b.name?-1:a.name>b.name?1:0;}});
  S.loading=false;render();
}
(async function(){
  render();
  var coreData=null;
  try{coreData=await fbLoad();}
  catch(e1){
    // 1нҡҢ мһ¬мӢңлҸ„
    try{await new Promise(function(r){setTimeout(r,1500);});coreData=await fbLoad();}
    catch(e2){
      S.loading=false;
      var app=document.getElementById('app');
      if(app)app.innerHTML='<div class="loading">лЎңл“ң мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҳкі  мғҲлЎңкі м№Ён•ҙмЈјм„ёмҡ”.<br><br><button onclick="location.reload()" style="padding:.6rem 1.25rem;border-radius:20px;background:linear-gradient(135deg,#E91E8C,#7B2FF7);color:#fff;border:none;font-weight:700;cursor:pointer;">мғҲлЎңкі м№Ё</button></div>';
      return;
    }
  }
  applyData(coreData);
  // кіөм§Җ(мқҙлҜём§Җ нҸ¬н•Ё)лҠ” лі„лҸ„ кІҪлЎңм—җм„ң л№„лҸҷкё°лЎң, мӢӨнҢЁн•ҙлҸ„ м•ұмқҖ м •мғҒ мһ‘лҸҷ
  fbLoadNotices().then(function(nd){S.notices=nd||{};render();}).catch(function(){S.notices={};});
})();


</script>
